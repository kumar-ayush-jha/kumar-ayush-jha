name: Update profile art

on:
  schedule:
    - cron: "17 3 * * *"   # daily, off the hour to dodge GitHub Actions load spikes
  workflow_dispatch: {}     # lets you trigger it manually the first time

permissions:
  contents: write

jobs:
  refresh-heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: Neo-Ayush-jha
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name "profile-art-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "chore: refresh contribution graph"
          git push
